<div class="toast-container" id="toastContainer"></div>

<script type="module">
  import { requireRole, signOut } from './auth.js';
  import { supabase } from './supabase-client.js';

  let allReports = [];

  function toast(msg, type = 'info') {
    const c = document.getElementById('toastContainer');
    const t = document.createElement('div');
    t.className = `toast toast-${type}`;
    t.textContent = msg;
    c.appendChild(t);
    setTimeout(() => t.remove(), 4000);
  }

  function formatDate(iso) {
    return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function renderTable(reports) {
    const tbody = document.getElementById('reportsBody');
    if (reports.length === 0) {
      tbody.innerHTML = '<tr><td colspan="7" class="empty-state">No reports found</td></tr>';
      return;
    }
    tbody.innerHTML = reports.map(r => `
      <tr>
        <td>${formatDate(r.created_at)}</td>
        <td>${r.vessel_name || '—'}</td>
        <td>${r.client_name || '—'}</td>
        <td>${r.job_location || '—'}</td>
        <td>${r.report_type || '—'}</td>
        <td><span class="badge badge-${r.status}">${r.status}</span></td>
        <td class="table-actions">
          <a href="report-view.html?id=${r.id}" class="table-btn">View</a>
          <a href="report-view.html?id=${r.id}" class="table-btn" onclick="window.print(); return false;" title="Print">Print</a>
          ${r.status === 'draft' ? `<button class="table-btn send" data-id="${r.id}" data-email="${r.client_email}" data-vessel="${r.vessel_name}" data-client="${r.client_name}">Send</button>` : ''}
        </td>
      </tr>
    `).join('');

    // Attach send buttons
    tbody.querySelectorAll('.table-btn.send').forEach(btn => {
      btn.addEventListener('click', async () => {
        if (!confirm(`Send report to ${btn.dataset.email}?`)) return;
        btn.disabled = true;
        btn.textContent = 'Sending...';
        try {
          const res = await fetch('/.netlify/functions/send-report', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              reportId: btn.dataset.id,
              clientEmail: btn.dataset.email,
              vesselName: btn.dataset.vessel,
              clientName: btn.dataset.client
            })
          });
          if (!res.ok) throw new Error((await res.json()).error);
          toast('Report sent successfully', 'success');
          setTimeout(() => location.reload(), 1500);
        } catch (e) {
          toast('Send failed: ' + e.message, 'error');
          btn.disabled = false;
          btn.textContent = 'Send';
        }
      });
    });
  }

  function applyFilters() {
    const status = document.getElementById('filterStatus').value;
    const type = document.getElementById('filterType').value;
    const filtered = allReports.filter(r =>
      (!status || r.status === status) &&
      (!type || r.report_type === type)
    );
    renderTable(filtered);
  }

  async function init() {
    const result = await requireRole('diver');
    if (!result) return;
    const { session } = result;

    const { data, error } = await supabase
      .from('reports')
      .select('*')
      .eq('diver_id', session.user.id)
      .order('created_at', { ascending: false });

    if (error) { toast('Failed to load reports', 'error'); return; }
    allReports = data;
    renderTable(allReports);

    document.getElementById('filterStatus').addEventListener('change', applyFilters);
    document.getElementById('filterType').addEventListener('change', applyFilters);
  }

  document.getElementById('signOutBtn').addEventListener('click', signOut);
  document.getElementById('sidebarSignOut').addEventListener('click', (e) => { e.preventDefault(); signOut(); });

  init();
</script>
