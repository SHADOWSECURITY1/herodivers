<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="styles.css">
</head>
<body>

<nav id="mainNav">
  <a href="https://herodivingandmarine.com" class="nav-brand">
    <img src="logo.png" class="bottlecap-logo" style="height:48px;" alt="Hero Diving">
    <span class="nav-brand-text">
      <span class="nav-brand-name">Hero</span>
      <span class="nav-brand-sub">Diver Portal</span>
    </span>
  </a>
  <ul class="nav-links">
    <li><a href="https://herodivingandmarine.com">Main Site</a></li>
  </ul>
</nav>

<div class="login-wrap">
  <div class="login-ocean"></div>
  <div class="god-rays">
    <div class="god-ray"></div>
    <div class="god-ray"></div>
    <div class="god-ray"></div>
    <div class="god-ray"></div>
  </div>
  <div class="bubbles" id="loginBubbles" data-bubbles="12"></div>
  <div class="plankton-field" id="loginPlankton" data-plankton="18"></div>

  <div class="login-card">
    <div class="login-logo">
      <img src="logo.png" alt="Hero Diving">
    </div>
    <div class="login-portal-tag">Hero Divers Portal</div>
    <div class="login-title">Sign In</div>

    <div class="form-error" id="loginError"></div>
    <div class="form-success" id="loginSuccess"></div>

    <form id="loginForm">
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input type="email" id="email" class="form-input" placeholder="diver@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input type="password" id="password" class="form-input" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-primary" id="loginBtn" style="width:100%;">Sign In</button>
    </form>

    <div class="login-footer" style="margin-top:16px; display:flex; justify-content:space-between;">
      <a href="#" id="forgotLink">Forgot Password?</a>
      <a href="signup.html">Create Account</a>
    </div>

    <!-- Forgot password panel -->
    <div id="forgotPanel" style="display:none; margin-top:24px; padding-top:24px; border-top:1px solid var(--border);">
      <div class="form-group">
        <label class="form-label" for="resetEmail">Enter your email</label>
        <input type="email" id="resetEmail" class="form-input" placeholder="diver@example.com">
      </div>
      <button class="btn-ghost" id="resetBtn" style="width:100%;">Send Reset Link</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script type="module">
  import { signIn, resetPassword, getProfile, getRoleRedirect } from './auth.js';
  import { supabase } from './supabase-client.js';

  // If already logged in, redirect to role-appropriate dashboard
  supabase.auth.getSession().then(async ({ data: { session } }) => {
    if (session) {
      const profile = await getProfile(session.user.id);
      window.location.href = getRoleRedirect(profile?.role);
    }
  });

  const form = document.getElementById('loginForm');
  const btn = document.getElementById('loginBtn');
  const errorEl = document.getElementById('loginError');
  const successEl = document.getElementById('loginSuccess');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    btn.disabled = true;
    btn.textContent = 'Signing In...';
    errorEl.classList.remove('visible');

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    const { error } = await signIn(email, password);
    if (error) {
      errorEl.textContent = error.message;
      errorEl.classList.add('visible');
      btn.disabled = false;
      btn.textContent = 'Sign In';
    } else {
      const { data: { session } } = await supabase.auth.getSession();
      const profile = await getProfile(session.user.id);
      window.location.href = getRoleRedirect(profile?.role);
    }
  });

  // Forgot password toggle
  document.getElementById('forgotLink').addEventListener('click', (e) => {
    e.preventDefault();
    const panel = document.getElementById('forgotPanel');
    panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
  });

  document.getElementById('resetBtn').addEventListener('click', async () => {
    const email = document.getElementById('resetEmail').value;
    if (!email) return;
    const { error } = await resetPassword(email);
    if (error) {
      errorEl.textContent = error.message;
      errorEl.classList.add('visible');
    } else {
      successEl.textContent = 'Password reset email sent. Check your inbox.';
      successEl.classList.add('visible');
      document.getElementById('forgotPanel').style.display = 'none';
    }
  });
</script>
<script src="main.js"></script>
</body>
</html>
